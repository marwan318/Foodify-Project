<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
   <link rel="stylesheet" href="../css/all.min.css">
   <link rel="stylesheet" href="../css/bootstrap.min.css">
   <link rel="stylesheet" href="../css/login.css">
   
</head>
<body>
    



    
    <form id="loginForm"  class="loginsec">


        <div class="container d-flex justify-content-center align-items-center vh-100">

<div class="main-box row">

<!-- LEFT SIDE -->

<div class="col-md-6 left-side text-center">

<h2 class="logo">Foodify.</h2>

<img src="../assets/imges/login-register/pngtree-glass-of-cola-and-burger-png-image_17920601.png" class="food-img">

</div>


<!-- RIGHT SIDE -->

<div class="col-md-5 login-card">

<h3 class="text-center mb-4    fs-1" >Login</h3>

<input type="email" class="form-control mb-3" placeholder="username@gmail.com" id="loginEmail"  >

<input type="password" class="form-control mb-3" placeholder="Password"   id="loginPassword"    >

 
                 <div class="alert alert-danger d-none" id="loginAlert">In correct Email or Password </div>
                 <div class="alert alert-success d-none" id="loginsuccessAlert">Success You are Loged in</div>

<button class="btn btn-login w-100">Sign in</button>

<div class="text-center mt-3">

<small>Don't have account? <span class="register"><a   class="text-warning"  href="./register.html">Register </a></span></small>

</div>

</div>

</div>


      

    </form>
    


    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
