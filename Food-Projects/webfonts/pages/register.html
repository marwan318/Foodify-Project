<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet" href="../css/bootstrap.min.css">
<link rel="stylesheet" href="../css/register.css">

</head>

<body>

<form id="registerForm">

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="main-box row">

<!-- LEFT SIDE -->

<div class="col-md-6 left-side text-center">

<h2 class="logo main-color">Foodify.</h2>

<img src="../assets/imges/login-register/pngtree-glass-of-cola-and-burger-png-image_17920601.png"
class="food-img">

</div>


<!-- RIGHT SIDE -->

<div class="col-md-5 login-card animate-card">

<h3 class="text-center mb-4 main-color">Create an account</h3>

<input type="text"
class="form-control mb-3"
id="signinName"
placeholder="Enter Your Name">

<input type="email"
class="form-control mb-3"
id="signinEmail"
placeholder="Enter Your Email">

<input type="password"
class="form-control mb-3"
id="signinPassword"
placeholder="Enter Your Password">

<button class="btn btn-outline-info w-100">Submit</button>

<div class="mt-3">

<p id="nameMsg" class="text-danger d-none">Name is required</p>

<p id="emailMsg" class="text-danger d-none">Email is required</p>

<p id="passMsg" class="text-danger d-none">Password is required</p>

<p id="existMsg" class="text-danger d-none">This email already exists</p>

<p id="successMsg" class="text-success d-none">Registration successful</p>

</div>

</div>

</div>

</div>

</form>

<script src="../js/bootstrap.bundle.min.js"></script>
<script src="../js/register.js"></script>

</body>

</html>
